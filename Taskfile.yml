version: "3"

vars:
  SHELL_FILES: cx tests/test.sh
  INSTALL_DIR: "{{.HOME}}/.local/bin"

tasks:
  install:
    desc: Symlink cx to ~/.local/bin
    cmds:
      - mkdir -p {{.INSTALL_DIR}}
      - ln -sf "$(pwd)/cx" {{.INSTALL_DIR}}/cx
    status:
      - test -L {{.INSTALL_DIR}}/cx

  uninstall:
    desc: Remove cx symlink
    cmds:
      - rm -f {{.INSTALL_DIR}}/cx

  test:
    desc: Run integration tests
    cmds:
      - bash tests/test.sh

  bench:
    desc: Benchmark cx commands
    cmds:
      - bash tests/bench.sh

  lint:
    desc: Lint shell scripts and JavaScript
    cmds:
      - shellcheck {{.SHELL_FILES}}
      - shfmt -d {{.SHELL_FILES}}
      - bunx @biomejs/biome check cx.js

  fmt:
    desc: Format shell scripts and JavaScript
    cmds:
      - shfmt -w {{.SHELL_FILES}}
      - bunx @biomejs/biome check --fix cx.js
